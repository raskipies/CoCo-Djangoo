<article class="game-card">
    <div class="game-card__media">
        {% if game.image %}
            <img class="game-card__image" src="{{ game.image }}" alt="{{ game.title }}">
        {% else %}
            <div class="game-card__placeholder">Brak obrazka</div>
        {% endif %}
    </div>

    <div class="game-card__content">
        <h2 class="game-card__title">{{ game.title }}</h2>
        <p class="game-card__description">{{ game.short_description|truncatechars:120 }}</p>
        <p class="game-card__price">{{ game.price }} PLN</p>
    </div>
</article>
