{% extends 'main/layout/layout.html' %}
{% load static %}

{% block title %}Request a Game{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{% static 'main/css/reqgame.css' %}">
{% endblock %}

{% block content %}
<section class="reqgame-page">
  <header class="reqgame-header">
    <h1>REQUEST A GAME</h1>
    <p>Didn't find your favorite game? Let us know, and we'll try to add it!</p>
  </header>

  <div class="reqgame-container">
    <form method="POST" class="reqgame-form">
      {% csrf_token %}

      <div class="form-group">
        <label for="game_title">Game Title *</label>
        <input type="text" id="game_title" name="game_title" placeholder="Enter The Game Title" required>
      </div>

      <div class="form-group">
        <label for="game_developer">Studio / Publisher (optional)</label>
        <input type="text" id="game_developer" name="game_developer" placeholder="Who created or published this game?">
      </div>

      <div class="form-group">
        <label for="game_link">Link (e.g., Steam, GOG, IGDB) (optional)</label>
        <input type="url" id="game_link" name="game_link" placeholder="https://...">
      </div>

      <div class="form-group">
        <label for="game_reason">Why should it be added? *</label>
        <textarea id="game_reason" name="game_reason" rows="5" placeholder="Write a few words..." required></textarea>
      </div>

      <button type="submit" class="reqgame-button">
        <i class="fas fa-paper-plane"></i> Submit Request
      </button>
    </form>
  </div>
</section>
{% endblock %}
