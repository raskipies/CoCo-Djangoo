{% extends 'main/layout/clean_layout.html' %}
{% load static %}

{% block title %}Register{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'main/css/register.css' %}">

<div class="register-page">
  <div class="register-container">
    <img src="{% static 'main/img/2.jpg' %}" alt="Logo" class="register-logo">

    <h1 class="register-title">Register</h1>
    <p class="register-subtitle">Create your account to get started</p>

    <form method="POST" action="/register" class="register-form">
      {% csrf_token %}

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required placeholder="Choose a username">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Create a password">
      </div>

      <button type="submit" class="register-button">Create Account</button>
    </form>

    <button type="button" class="go-back-button" onclick="window.history.back()">← Go Back</button>
  </div>
</div>

{% endblock %}
