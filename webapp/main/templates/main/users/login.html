{% extends 'main/layout/clean_layout.html' %}
{% load static %}

{% block title %}Log in{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'main/css/login.css' %}">

<div class="login-page">
  <div class="login-container">
    <img src="{% static 'main/img/2.jpg' %}" alt="Logo" class="login-logo">

    <h1 class="login-title">Welcome Back!</h1>
    <p class="login-subtitle">Log in to your account</p>

    {% if messages %}
    <div class="alert" role="alert">
      <ul>
        {% for message in messages %}
        <li {% if message.tags %}class="{{ message.tags }}" {% endif %}>{{ message }}</li>
        {% endfor %}
      </ul>
    </div>
    {% endif %}

    <form method="POST" action="/login" class="login-form">
      {% csrf_token %}

      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required placeholder="Enter your username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Enter your password">
      </div>

      <button type="submit" class="login-button">Log In</button>
    </form>

    <div class="login-footer">
      <button type="button" class="go-back-button" onclick="window.history.back()">← Go Back</button>
    </div>
  </div>
</div>

{% endblock %}
